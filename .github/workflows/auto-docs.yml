name: Generate Educational Docs with Gemini

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Run documentation generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Här styr vi vilken modell skriptet faktiskt använder
          GEMINI_MODEL: gemini-3.1-flash-preview
        run: python .github/scripts/generate_docs.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: AI-genererad lektionsdagbok [skip ci]"
          git push
